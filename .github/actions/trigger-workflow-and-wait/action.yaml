name: Trigger Workflow and Wait
description: Triggers a workflow in a remote repository and waits for completion with automatic GitHub App token refresh

inputs:
  repository:
    description: 'Target repository (format: owner/repo)'
    required: true
  workflow_file:
    description: 'Workflow file name (e.g., build.yml)'
    required: true
  workflow_ref:
    description: 'Git ref to use when triggering the workflow'
    required: false
    default: 'master'
  workflow_inputs:
    description: 'Workflow inputs as JSON string (e.g., {"key": "value"})'
    required: false
    default: '{}'
  github_app_id:
    description: 'GitHub App ID for authentication'
    required: true
  github_app_private_key:
    description: 'GitHub App private key for authentication'
    required: true

outputs:
  workflow_status:
    description: 'Final workflow status (success, failure, skipped)'
    value: ${{ steps.wait-for-workflow.outputs.status }}
  workflow_url:
    description: 'URL to the triggered workflow run'
    value: ${{ steps.wait-for-workflow.outputs.url }}
  workflow_run_id:
    description: 'Workflow run ID'
    value: ${{ steps.wait-for-workflow.outputs.run_id }}

runs:
  using: composite
  steps:
    - name: Validate inputs
      shell: bash
      env:
        REPOSITORY: ${{ inputs.repository }}
        WORKFLOW_FILE: ${{ inputs.workflow_file }}
      run: |
        if [[ -z "${REPOSITORY}" ]]; then
          echo "❌ Error: repository is required"
          exit 1
        fi

        if [[ -z "${WORKFLOW_FILE}" ]]; then
          echo "❌ Error: workflow_file is required"
          exit 1
        fi

        # Validate repository format
        if [[ ! "${REPOSITORY}" =~ ^[^/]+/[^/]+$ ]]; then
          echo "❌ Error: repository must be in format 'owner/repo'"
          exit 1
        fi

        echo "🎯 Target: ${REPOSITORY} | Workflow: ${WORKFLOW_FILE}"

    - name: Install Python dependencies
      shell: bash
      run: |
        pip install --quiet PyJWT cryptography

    - name: Extract repository owner and name
      id: extract-repo
      shell: bash
      env:
        REPOSITORY: ${{ inputs.repository }}
      run: |
        OWNER=$(echo "${REPOSITORY}" | cut -d'/' -f1)
        REPO_NAME=$(echo "${REPOSITORY}" | cut -d'/' -f2)
        echo "owner=${OWNER}" >> $GITHUB_OUTPUT
        echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT

    - name: Generate GitHub App installation token
      id: app-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ inputs.github_app_id }}
        private-key: ${{ inputs.github_app_private_key }}
        owner: ${{ steps.extract-repo.outputs.owner }}
        repositories: ${{ steps.extract-repo.outputs.repo_name }}

    - name: Capture token creation timestamp
      id: capture-timestamp
      shell: bash
      run: |
        echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

    - name: Trigger workflow
      id: trigger-workflow
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        REPOSITORY: ${{ inputs.repository }}
        WORKFLOW_FILE: ${{ inputs.workflow_file }}
        WORKFLOW_REF: ${{ inputs.workflow_ref }}
        WORKFLOW_INPUTS: ${{ inputs.workflow_inputs }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        "${ACTION_PATH}/trigger-workflow.sh"

    - name: Wait for workflow completion with auto-refresh
      id: wait-for-workflow
      shell: bash
      env:
        GITHUB_APP_ID: ${{ inputs.github_app_id }}
        GITHUB_APP_PRIVATE_KEY: ${{ inputs.github_app_private_key }}
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        INITIAL_TOKEN_CREATED_AT: ${{ steps.capture-timestamp.outputs.timestamp }}
        REPOSITORY: ${{ inputs.repository }}
        WORKFLOW_RUN_ID: ${{ steps.trigger-workflow.outputs.run_id }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        python3 "${ACTION_PATH}/wait-for-workflow.py"
